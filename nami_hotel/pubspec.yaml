name: nami_hotel
description: "Multi-tenant Hotel Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Design ---
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # --- State Management ---
  flutter_riverpod: ^2.6.1

  # --- Navigation ---
  go_router: ^14.8.1

  # --- Backend (Appwrite) ---
  appwrite: ^13.0.0

  # --- Local Database (Offline-First) ---
  # Using sqflite for offline cache — stable, well-maintained, and avoids
  # the Isar generator compatibility issues with other code generators.
  sqflite: ^2.4.2
  path_provider: ^2.1.5

  # --- Forms & Validation ---
  reactive_forms: ^17.0.1

  # --- Image Handling (KYC) ---
  image_picker: ^1.2.2
  flutter_image_compress: ^2.4.0

  # --- Charts (Dashboard) ---
  fl_chart: ^0.70.2

  # --- Connectivity (Offline Sync) ---
  connectivity_plus: ^6.1.4

  # --- Utilities ---
  intl: ^0.20.2
  uuid: ^4.5.3
  shared_preferences: ^2.5.3
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  equatable: ^2.0.7
  path: ^1.9.1
  reactive_date_time_picker: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Code Generators ---
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  freezed: ^3.0.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

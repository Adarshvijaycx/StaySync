name: hotel_management
description: Multi-tenant Hotel Management App — Flutter + Appwrite
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─── Backend ───────────────────────────────────────────────
  appwrite: ^13.0.0          # ✅ Already installed — Appwrite BaaS SDK

  # ─── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1   # Core Riverpod hooks & providers
  riverpod_annotation: ^2.3.5 # Code-gen annotations for Riverpod

  # ─── Navigation ────────────────────────────────────────────
  go_router: ^14.2.0         # Declarative routing with role-based guards

  # ─── Local Database (Offline-First) ────────────────────────
  isar: ^3.1.0+1             # High-perf NoSQL local DB
  isar_flutter_libs: ^3.1.0+1 # Native Isar binaries for Flutter
  path_provider: ^2.1.3      # Required by Isar to resolve DB path

  # ─── Connectivity & Sync ───────────────────────────────────
  connectivity_plus: ^6.0.5  # Detect online / offline state

  # ─── Image Handling ────────────────────────────────────────
  image_picker: ^1.1.2       # Camera + gallery access
  flutter_image_compress: ^2.3.0 # Compress before Appwrite upload
  cached_network_image: ^3.3.1   # Cache & display Appwrite Storage images

  # ─── Forms & Validation ────────────────────────────────────
  reactive_forms: ^17.0.1    # Declarative form with built-in validators

  # ─── Charts (Dashboard) ────────────────────────────────────
  fl_chart: ^0.68.0          # Bar chart + line chart for dashboard

  # ─── Utilities ─────────────────────────────────────────────
  intl: ^0.19.0              # Date/time formatting, locale
  uuid: ^4.4.0               # Generate local UUIDs for offline records
  equatable: ^2.0.5          # Value equality for models
  freezed_annotation: ^2.4.1 # Immutable data classes
  json_annotation: ^4.9.0    # JSON serialization

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ─── Code Generators ───────────────────────────────────────
  build_runner: ^2.4.9        # Runs all code-gen below
  isar_generator: ^3.1.0+1    # Generates Isar schema adapters
  riverpod_generator: ^2.4.3  # Generates typed Riverpod providers
  freezed: ^2.5.2             # Generates immutable model classes
  json_serializable: ^6.8.0   # Generates toJson / fromJson

  # ─── Linting ───────────────────────────────────────────────
  flutter_lints: ^4.0.0
  riverpod_lint: ^2.3.10      # Riverpod-specific lint rules
  custom_lint: ^0.6.4

flutter:
  uses-material-design: true
  # Add asset folders when needed:
  # assets:
  #   - assets/images/
  #   - assets/icons/
